spring.application.name=smart-contact-manager

# --- Local development database (H2, in-memory) ---
# Data resets every time you restart the app -- that's expected for dev.
spring.datasource.url=jdbc:h2:mem:contactsdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Lets you view the DB in a browser at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Auto-creates/updates tables based on your @Entity classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.port=8080
