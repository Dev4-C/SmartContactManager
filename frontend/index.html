<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Contact Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">
    <header class="app-header">
      <h1>Smart Contact Manager</h1>
      <p class="subtitle">Add, search, and manage your contacts</p>
    </header>

    <section class="panel">
      <form id="contact-form" class="contact-form">
        <input type="hidden" id="contact-id" />

        <div class="field">
          <label for="name">Name</label>
          <input type="text" id="name" required />
        </div>

        <div class="field">
          <label for="phone">Phone</label>
          <input type="text" id="phone" required />
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" />
        </div>

        <div class="field">
          <label for="address">Address</label>
          <input type="text" id="address" />
        </div>

        <div class="form-actions">
          <button type="submit" id="submit-btn">Add Contact</button>
          <button type="button" id="cancel-edit-btn" class="secondary hidden">Cancel</button>
        </div>

        <p id="form-error" class="error hidden"></p>
      </form>
    </section>

    <section class="panel">
      <div class="toolbar">
        <input type="text" id="search-input" placeholder="Search by name..." />
        <button id="search-btn" class="secondary">Search</button>
        <button id="clear-search-btn" class="secondary">Clear</button>
        <select id="sort-select">
          <option value="">Sort: default</option>
          <option value="name">Sort: name (A–Z)</option>
        </select>
      </div>
    </section>

    <section class="panel">
      <div id="contact-list" class="contact-list">
        <p class="empty-state">Loading contacts...</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
